name: Testing

# On Pull and Push to the develop branch, run tests and build the project
on:
  pull_request:
    branches: [ "develop" ]
  push:
    branches: [ "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SQLALCHEMY_DATABASE_URI: "sqlite:///:memory:"
      JWT_SECRET_KEY: "dummy-secret-key"
    
    steps:
      # Gets the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Sets up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Run test
      - name: Run test
        run: |
          pytest tests